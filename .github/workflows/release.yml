name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build zip
        run: |
          cd custom_components/fuel_price
          zip -r ../../fuel_price.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: fuel_price.zip
          generate_release_notes: true
